<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, shrink-to-fit=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Covo Tech Forge" />
    <meta name="theme-color" content="#7C3AED" />
    <meta name="msapplication-TileColor" content="#7C3AED" />
    
    <title>Covo Tech Forge - Premium Electronics & Technology Store</title>
    <meta name="description" content="Discover cutting-edge electronics, laptops, smartphones, and tech accessories at Covo Tech Forge. Quality products, competitive prices, and exceptional customer service." />
    <meta name="keywords" content="electronics, laptops, smartphones, technology, computers, gadgets, online store, tech accessories" />
    <meta name="author" content="Covo Tech Forge" />
    <meta name="robots" content="index,follow" />
    <meta name="googlebot" content="index,follow" />

    <!-- Preconnect to external domains for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/site.webmanifest" />
    
    <!-- Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    
    <!-- Touch Icons for iOS -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    
    <!-- Microsoft Tiles -->
    <meta name="msapplication-config" content="/browserconfig.xml" />
    
    <!-- Cross-platform compatibility styles -->
    <style>
      /* Prevent text size adjustment on mobile devices */
      html {
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
        -moz-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      
      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }
      
      /* Better touch scrolling on iOS */
      * {
        -webkit-overflow-scrolling: touch;
      }
      
      /* Prevent horizontal scroll */
      body {
        overflow-x: hidden;
      }
      
      /* Better tap targets for touch devices */
      button, a, [role="button"] {
        min-height: 44px;
        min-width: 44px;
      }
      
      /* Disable user select on non-text elements */
      button, img, svg {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }
      
      /* Better focus indicators */
      *:focus-visible {
        outline: 2px solid #7C3AED;
        outline-offset: 2px;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
